name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # Runs every 12 hours
  workflow_dispatch:           # Manual trigger anytime
  push:
    branches:
      - main                   # Trigger on main branch
      - master                 # Trigger on master branch

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10        # Increased from 5 to prevent timeout failures

    steps:
      - name: Generate Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push Snake SVG to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          keep_history: true   # Prevents wiping other files in output branch
          jekyll: false        # Prevents Jekyll from corrupting SVG files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
