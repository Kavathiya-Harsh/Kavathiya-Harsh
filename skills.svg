<svg xmlns="http://www.w3.org/2000/svg" width="800" height="490" viewBox="0 0 800 490">
  <defs>
    <filter id="glow" x="-10%" y="-100%" width="120%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#060D1A"/>
    </linearGradient>
    <clipPath id="bar0"><rect x="170" y="69" width="420" height="20" rx="10"/></clipPath>
    <clipPath id="bar1"><rect x="170" y="121" width="420" height="20" rx="10"/></clipPath>
    <clipPath id="bar2"><rect x="170" y="173" width="420" height="20" rx="10"/></clipPath>
    <clipPath id="bar3"><rect x="170" y="225" width="420" height="20" rx="10"/></clipPath>
    <clipPath id="bar4"><rect x="170" y="277" width="420" height="20" rx="10"/></clipPath>
    <clipPath id="bar5"><rect x="170" y="329" width="420" height="20" rx="10"/></clipPath>
    <clipPath id="bar6"><rect x="170" y="381" width="420" height="20" rx="10"/></clipPath>
    <clipPath id="bar7"><rect x="170" y="433" width="420" height="20" rx="10"/></clipPath>
  </defs>

  <style>
    @keyframes fillBar0  { 0%{width:0}  100%{width:357px} }
    @keyframes fillBar1  { 0%{width:0}  100%{width:336px} }
    @keyframes fillBar2  { 0%{width:0}  100%{width:336px} }
    @keyframes fillBar3  { 0%{width:0}  100%{width:336px} }
    @keyframes fillBar4  { 0%{width:0}  100%{width:302px} }
    @keyframes fillBar5  { 0%{width:0}  100%{width:273px} }
    @keyframes fillBar6  { 0%{width:0}  100%{width:231px} }
    @keyframes fillBar7  { 0%{width:0}  100%{width:231px} }
    @keyframes fadeIn    { 0%{opacity:0} 60%{opacity:0} 100%{opacity:1} }
    @keyframes slideIn   { 0%{opacity:0;transform:translateX(-8px)} 100%{opacity:1;transform:translateX(0)} }
    @keyframes pulse     { 0%,100%{opacity:1} 50%{opacity:0.6} }

    .f0  { animation: fillBar0  1.4s cubic-bezier(0.22,1,0.36,1) 0.10s both; }
    .f1  { animation: fillBar1  1.4s cubic-bezier(0.22,1,0.36,1) 0.22s both; }
    .f2  { animation: fillBar2  1.4s cubic-bezier(0.22,1,0.36,1) 0.34s both; }
    .f3  { animation: fillBar3  1.4s cubic-bezier(0.22,1,0.36,1) 0.46s both; }
    .f4  { animation: fillBar4  1.4s cubic-bezier(0.22,1,0.36,1) 0.58s both; }
    .f5  { animation: fillBar5  1.4s cubic-bezier(0.22,1,0.36,1) 0.70s both; }
    .f6  { animation: fillBar6  1.4s cubic-bezier(0.22,1,0.36,1) 0.82s both; }
    .f7  { animation: fillBar7  1.4s cubic-bezier(0.22,1,0.36,1) 0.94s both; }

    .lbl  { animation: slideIn  0.6s ease both; }
    .l0   { animation-delay: 0.05s; }
    .l1   { animation-delay: 0.17s; }
    .l2   { animation-delay: 0.29s; }
    .l3   { animation-delay: 0.41s; }
    .l4   { animation-delay: 0.53s; }
    .l5   { animation-delay: 0.65s; }
    .l6   { animation-delay: 0.77s; }
    .l7   { animation-delay: 0.89s; }

    .pct  { animation: fadeIn 2s ease both; }
    .bdg  { animation: fadeIn 2.2s ease both; }
    .dot  { animation: pulse 2.4s ease-in-out infinite; }
  </style>

  <!-- Outer background -->
  <rect width="800" height="490" rx="14" fill="url(#bgGrad)"/>
  <!-- Outer border glow -->
  <rect x="0.5" y="0.5" width="799" height="489" rx="13.5" fill="none" stroke="#00D4FF" stroke-width="1" stroke-opacity="0.25"/>

  <!-- Header strip -->
  <rect width="800" height="52" rx="14" fill="#0D1F35"/>
  <rect y="38" width="800" height="14" fill="#0D1F35"/>
  <line x1="0" y1="52" x2="800" y2="52" stroke="#1E3A5F" stroke-width="1"/>

  <!-- Header labels -->
  <text x="22" y="31" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="10" font-weight="700" fill="#4A7FA5" letter-spacing="2">SKILL</text>
  <text x="172" y="31" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="10" font-weight="700" fill="#4A7FA5" letter-spacing="2">PROGRESS</text>
  <text x="600" y="31" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="10" font-weight="700" fill="#4A7FA5" letter-spacing="2">PCT</text>
  <text x="645" y="31" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="10" font-weight="700" fill="#4A7FA5" letter-spacing="2">LEVEL</text>

  <!-- ── ROW DIVIDERS ── -->
  <line x1="20" y1="104" x2="780" y2="104" stroke="#1E3A5F" stroke-width="0.5" stroke-opacity="0.6"/>
  <line x1="20" y1="156" x2="780" y2="156" stroke="#1E3A5F" stroke-width="0.5" stroke-opacity="0.6"/>
  <line x1="20" y1="208" x2="780" y2="208" stroke="#1E3A5F" stroke-width="0.5" stroke-opacity="0.6"/>
  <line x1="20" y1="260" x2="780" y2="260" stroke="#1E3A5F" stroke-width="0.5" stroke-opacity="0.6"/>
  <line x1="20" y1="312" x2="780" y2="312" stroke="#1E3A5F" stroke-width="0.5" stroke-opacity="0.6"/>
  <line x1="20" y1="364" x2="780" y2="364" stroke="#1E3A5F" stroke-width="0.5" stroke-opacity="0.6"/>
  <line x1="20" y1="416" x2="780" y2="416" stroke="#1E3A5F" stroke-width="0.5" stroke-opacity="0.6"/>

