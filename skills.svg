<svg xmlns="http://www.w3.org/2000/svg" width="365" height="215" viewBox="0 0 760 448">
  <defs>
    <filter id="glow" x="-5%" y="-120%" width="115%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#060C18"/>
    </linearGradient>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0E2242"/>
      <stop offset="100%" stop-color="#07101E"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="55%" stop-color="#009EC0"/>
      <stop offset="100%" stop-color="#005F80"/>
    </linearGradient>
    <linearGradient id="shn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="c0"><rect x="184" y="63"  width="416" height="16" rx="8"/></clipPath>
    <clipPath id="c1"><rect x="184" y="112" width="416" height="16" rx="8"/></clipPath>
    <clipPath id="c2"><rect x="184" y="161" width="416" height="16" rx="8"/></clipPath>
    <clipPath id="c3"><rect x="184" y="210" width="416" height="16" rx="8"/></clipPath>
    <clipPath id="c4"><rect x="184" y="259" width="416" height="16" rx="8"/></clipPath>
    <clipPath id="c5"><rect x="184" y="308" width="416" height="16" rx="8"/></clipPath>
    <clipPath id="c6"><rect x="184" y="357" width="416" height="16" rx="8"/></clipPath>
    <clipPath id="c7"><rect x="184" y="406" width="416" height="16" rx="8"/></clipPath>
  </defs>

  <style>
    @keyframes b0{0%{width:0}100%{width:354px}}
    @keyframes b1{0%{width:0}100%{width:333px}}
    @keyframes b2{0%{width:0}100%{width:333px}}
    @keyframes b3{0%{width:0}100%{width:333px}}
    @keyframes b4{0%{width:0}100%{width:300px}}
    @keyframes b5{0%{width:0}100%{width:271px}}
    @keyframes b6{0%{width:0}100%{width:229px}}
    @keyframes b7{0%{width:0}100%{width:229px}}
    @keyframes sIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
    @keyframes fIn{0%,48%{opacity:0}100%{opacity:1}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
    @keyframes headPulse{0%,100%{opacity:.8}50%{opacity:.4}}
    .B0{animation:b0 1.5s cubic-bezier(.22,1,.36,1) .06s both}
    .B1{animation:b1 1.5s cubic-bezier(.22,1,.36,1) .19s both}
    .B2{animation:b2 1.5s cubic-bezier(.22,1,.36,1) .32s both}
    .B3{animation:b3 1.5s cubic-bezier(.22,1,.36,1) .45s both}
    .B4{animation:b4 1.5s cubic-bezier(.22,1,.36,1) .58s both}
    .B5{animation:b5 1.5s cubic-bezier(.22,1,.36,1) .71s both}
    .B6{animation:b6 1.5s cubic-bezier(.22,1,.36,1) .84s both}
    .B7{animation:b7 1.5s cubic-bezier(.22,1,.36,1) .97s both}
    .L0{animation:sIn .6s ease .03s both}
    .L1{animation:sIn .6s ease .16s both}
    .L2{animation:sIn .6s ease .29s both}
    .L3{animation:sIn .6s ease .42s both}
    .L4{animation:sIn .6s ease .55s both}
    .L5{animation:sIn .6s ease .68s both}
    .L6{animation:sIn .6s ease .81s both}
    .L7{animation:sIn .6s ease .94s both}
    .F0{animation:fIn 2.2s ease .06s both}
    .F1{animation:fIn 2.2s ease .19s both}
    .F2{animation:fIn 2.2s ease .32s both}
    .F3{animation:fIn 2.2s ease .45s both}
    .F4{animation:fIn 2.2s ease .58s both}
    .F5{animation:fIn 2.2s ease .71s both}
    .F6{animation:fIn 2.2s ease .84s both}
    .F7{animation:fIn 2.2s ease .97s both}
    .dot{animation:pulse 2.4s ease-in-out infinite}
    .hd{animation:headPulse 3s ease-in-out infinite}
    .lbl{font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;font-weight:600;fill:#C8D6E8}
    .pct{font-family:'Segoe UI',system-ui,sans-serif;font-size:12px;font-weight:700;fill:#00D4FF}
    .bdg{font-family:'Segoe UI',system-ui,sans-serif;font-size:10px;font-weight:700}
    .htxt{font-family:'Segoe UI',system-ui,sans-serif;font-size:11px;font-weight:700;fill:#00D4FF;letter-spacing:2.5px}
    .hsub{font-family:'Segoe UI',system-ui,sans-serif;font-size:10px;font-weight:400;fill:#3A6080;letter-spacing:1px}
  </style>

