  <!-- Pulsing dot -->
  <circle class="dot" cx="10" cy="79" r="3" fill="#00D4FF"/>
  <!-- Skill name -->
  <text class="lbl l0" x="22" y="84" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="14" font-weight="600" fill="#E2E8F0">HTML &amp; CSS</text>
  <!-- Bar bg -->
  <rect x="170" y="69" width="420" height="20" rx="10" fill="#0F2236"/>
  <!-- Bar fill (clip + animate width) -->
  <g clip-path="url(#bar0)">
    <rect class="f0" x="170" y="69" height="20" rx="10" fill="url(#barGrad)" filter="url(#glow)"/>
    <rect class="f0" x="170" y="69" height="10" rx="10" fill="url(#sheen)"/>
  </g>
  <!-- Tick marks on bg -->
  <line x1="254" y1="69" x2="254" y2="89" stroke="#1E3A5F" stroke-width="1"/>
  <line x1="338" y1="69" x2="338" y2="89" stroke="#1E3A5F" stroke-width="1"/>
  <line x1="422" y1="69" x2="422" y2="89" stroke="#1E3A5F" stroke-width="1"/>
  <line x1="506" y1="69" x2="506" y2="89" stroke="#1E3A5F" stroke-width="1"/>
  <!-- Percent -->
  <text class="pct" x="607" y="84" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="14" font-weight="700" fill="#00D4FF" text-anchor="end">85%</text>
  <!-- Badge — Expert (purple) -->
  <g class="bdg">
    <rect x="616" y="65" width="72" height="24" rx="12" fill="#3C3489" fill-opacity="0.7" stroke="#7F77DD" stroke-width="0.8"/>
